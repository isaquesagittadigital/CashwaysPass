<div class="space-y-8">
    <!-- Register New Professor -->
    <div class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm">
        <h3 class="text-xl font-bold text-gray-900 mb-6 font-primary">Cadastrar novo professor</h3>

        <form [formGroup]="professorForm" (ngSubmit)="addProfessor()"
            class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
            <div class="form-group">
                <label>Nome completo *</label>
                <input type="text" formControlName="nome" class="form-input" placeholder="Nome completo">
            </div>

            <div class="form-group">
                <label>Grau de escolaridade *</label>
                <select formControlName="escolaridade" class="form-input">
                    <option value="">Selecione o grau</option>
                    <option *ngFor="let option of escolaridadeOptions" [value]="option.value">{{ option.label }}
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Email do professor *</label>
                <input type="email" formControlName="email" class="form-input" placeholder="email@exemplo.com">
            </div>

            <div class="flex items-center gap-4">
                <button type="submit"
                    class="btn-secondary h-[46px] w-full max-w-[200px] flex items-center justify-center gap-2">
                    <lucide-icon [img]="icons.Plus" class="w-5 h-5"></lucide-icon>
                    Cadastrar professor
                </button>
                <div class="text-sm text-gray-400">Preencha os campos para realizar um novo cadastro.</div>
            </div>
        </form>
    </div>

    <!-- Professors List -->
    <div class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm">
        <h3 class="text-xl font-bold text-gray-900 mb-6 font-primary">Professores cadastrados</h3>

        <div class="flex flex-wrap items-center gap-4 mb-8">
            <div class="flex-1 min-w-[240px]">
                <div class="relative">
                    <lucide-icon [img]="icons.Search"
                        class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></lucide-icon>
                    <input type="text" placeholder="Buscar professor" class="form-input pl-12">
                </div>
            </div>
            <div class="min-w-[180px]">
                <select class="form-input">
                    <option value="">Filtrar por grau</option>
                </select>
            </div>
            <div class="min-w-[180px]">
                <select class="form-input">
                    <option value="">Filtrar por status</option>
                </select>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-gray-100">
                        <th class="py-4">Nome</th>
                        <th class="py-4">Grau de escolaridade</th>
                        <th class="py-4 text-center">Ações</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <tr *ngFor="let professor of professors$ | async" class="group">
                        <td class="py-4 font-bold text-gray-700">{{ professor.nome }}</td>
                        <td class="py-4">
                            <span class="px-3 py-1 bg-gray-50 text-gray-500 text-xs font-bold rounded-full">
                                {{ professor.escolaridade }}
                            </span>
                        </td>
                        <td class="py-4">
                            <div class="flex items-center justify-center gap-3">
                                <button (click)="removeProfessor(professor.id!)"
                                    class="p-2 text-red-100 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all">
                                    <lucide-icon [img]="icons.Trash2" class="w-5 h-5"></lucide-icon>
                                </button>
                                <button
                                    class="p-2 text-gray-300 hover:text-gray-600 hover:bg-gray-50 rounded-lg transition-all border border-gray-100">
                                    <lucide-icon [img]="icons.Edit" class="w-5 h-5"></lucide-icon>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr *ngIf="(professors$ | async)?.length === 0">
                        <td colspan="3" class="py-8 text-center text-gray-400">Nenhum professor cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex items-center justify-between mt-8 text-sm">
            <span class="text-gray-400">Página 1 de 1</span>
            <div class="flex gap-2">
                <button
                    class="btn-secondary py-2 px-4 text-xs font-bold opacity-50 cursor-not-allowed">Anterior</button>
                <button class="btn-secondary py-2 px-4 text-xs font-bold opacity-50 cursor-not-allowed">Próximo</button>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-4 pt-8 border-t border-gray-100">
        <button (click)="onBack()" type="button" class="btn-secondary px-12">Voltar</button>
        <button (click)="onNext()" type="button" class="btn-primary px-12">Prosseguir</button>
    </div>
</div>
