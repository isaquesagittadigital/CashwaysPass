<div class="p-8 space-y-8 animate-in fade-in duration-500">
    <div *ngIf="isLoading" class="flex flex-col items-center justify-center p-20 gap-4">
        <div class="w-10 h-10 border-4 border-[#00609b]/20 border-t-[#00609b] rounded-full animate-spin"></div>
        <p class="text-sm text-gray-400 font-medium">Carregando detalhes da escola...</p>
    </div>

    <div *ngIf="!isLoading && school" class="space-y-8">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <button (click)="onBack()"
                    class="p-2 hover:bg-gray-100 rounded-lg transition-all text-gray-400 hover:text-gray-600">
                    <lucide-icon [img]="icons.ArrowLeft" class="w-6 h-6"></lucide-icon>
                </button>
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 tracking-tight font-primary">{{ school.nome_fantasia }}
                    </h1>
                    <p class="text-sm text-gray-500 mt-1">Gerenciamento completo da unidade escolar.</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <span [class]="school.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'"
                    class="px-4 py-1.5 text-xs font-bold rounded-full uppercase border border-white shadow-sm">
                    {{ school.status === 'active' ? 'Ativo' : 'Inativo' }}
                </span>
            </div>
        </header>

        <!-- Tabs Nav -->
        <div class="flex border-b border-gray-100 gap-8">
            <button (click)="activeTab = 'details'" [class.active-tab]="activeTab === 'details'" class="tab-btn">Dados
                da Escola</button>
            <button (click)="activeTab = 'turmas'" [class.active-tab]="activeTab === 'turmas'"
                class="tab-btn">Turmas</button>
            <button (click)="activeTab = 'professors'" [class.active-tab]="activeTab === 'professors'"
                class="tab-btn">Professores</button>
            <button (click)="activeTab = 'students'" [class.active-tab]="activeTab === 'students'"
                class="tab-btn">Alunos</button>
        </div>

        <!-- Tab Content -->
        <div [ngSwitch]="activeTab">
            <!-- Details Tab -->
            <div *ngSwitchCase="'details'"
                class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 animate-in slide-in-from-bottom-4 duration-300">
                <form [formGroup]="schoolForm" (ngSubmit)="onSubmit()" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="form-group">
                            <label>Nome da escola *</label>
                            <input type="text" formControlName="nome" class="form-input" placeholder="Nome da escola">
                        </div>
                        <div class="form-group">
                            <label>CNPJ *</label>
                            <input type="text" formControlName="cnpj" class="form-input"
                                placeholder="00.000.000/0001-00">
                        </div>
                        <div class="form-group">
                            <label>Razão social *</label>
                            <input type="text" formControlName="razao_social" class="form-input"
                                placeholder="Razão social">
                        </div>
                    </div>

                    <div class="p-6 bg-gray-50 rounded-xl space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="form-group">
                                <label>Modelo de contratação *</label>
                                <select formControlName="modelo_contratacao" class="form-input">
                                    <option value="Full">Full</option>
                                    <option value="Light">Light</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="form-group">
                                <label>Dias de início para repasse *</label>
                                <div class="flex items-center gap-6 mt-2">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" formControlName="dias_repasse" [value]="3"
                                            class="w-4 h-4 text-primary">
                                        <span class="text-sm font-medium">3 dias</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" formControlName="dias_repasse" [value]="5"
                                            class="w-4 h-4 text-primary">
                                        <span class="text-sm font-medium">5 dias</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" formControlName="dias_repasse" [value]="10"
                                            class="w-4 h-4 text-primary">
                                        <span class="text-sm font-medium">10 dias</span>
                                    </label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Equipamentos *</label>
                                <div class="flex items-center gap-6 mt-2">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" formControlName="possui_equipamentos" [value]="true"
                                            class="w-4 h-4 text-primary">
                                        <span class="text-sm font-medium">Sim</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" formControlName="possui_equipamentos" [value]="false"
                                            class="w-4 h-4 text-primary">
                                        <span class="text-sm font-medium">Não</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6"
                            *ngIf="schoolForm.get('possui_equipamentos')?.value">
                            <div class="form-group">
                                <label>Quantidade *</label>
                                <input type="number" formControlName="quantidade_equipamentos" class="form-input"
                                    placeholder="0">
                            </div>
                            <div class="form-group">
                                <label>Valor unitário *</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">R$</span>
                                    <input type="number" formControlName="valor_unitario_equipamento"
                                        class="form-input pl-12" placeholder="0,00">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="form-group">
                                <label>Transações *</label>
                                <div class="flex items-center gap-6 mt-2">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" formControlName="cobra_transacoes" [value]="true"
                                            class="w-4 h-4 text-primary">
                                        <span class="text-sm font-medium">Sim</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" formControlName="cobra_transacoes" [value]="false"
                                            class="w-4 h-4 text-primary">
                                        <span class="text-sm font-medium">Não</span>
                                    </label>
                                </div>
                            </div>
                            <div class="form-group" *ngIf="schoolForm.get('cobra_transacoes')?.value">
                                <label>Valor unitário *</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">R$</span>
                                    <input type="number" formControlName="valor_unitario_transacao"
                                        class="form-input pl-12" placeholder="0,00">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="form-group">
                            <label>Série *</label>
                            <select formControlName="serie" class="form-input">
                                <option value="">Selecionar série</option>
                                <option *ngFor="let option of seriesOptions" [value]="option.value">{{ option.label }}
                                </option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nome da direção *</label>
                            <input type="text" formControlName="nome_direcao" class="form-input"
                                placeholder="Nome da direção">
                        </div>
                        <div class="form-group">
                            <label>Nome do secretariado *</label>
                            <input type="text" formControlName="nome_secretariado" class="form-input"
                                placeholder="Nome do secretariado">
                        </div>
                        <div class="form-group">
                            <label>Email da escola *</label>
                            <input type="email" formControlName="email" class="form-input"
                                placeholder="email@exemplo.com">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="form-group">
                            <label>Email da secretaria (admin) *</label>
                            <input type="email" formControlName="email_secretaria_admin" class="form-input"
                                placeholder="email02@exemplo.com">
                        </div>
                        <div class="form-group">
                            <label>Telefone *</label>
                            <input type="text" formControlName="telefone" class="form-input" placeholder="(DDD)">
                        </div>
                        <div class="form-group">
                            <label>Whatsapp *</label>
                            <input type="text" formControlName="whatsapp" class="form-input" placeholder="(DDD)">
                        </div>
                        <div class="form-group">
                            <label>CEP *</label>
                            <input type="text" formControlName="cep" class="form-input" placeholder="01234-567">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="form-group">
                            <label>Complemento</label>
                            <input type="text" formControlName="complemento" class="form-input"
                                placeholder="Sala, andar e etc.">
                        </div>
                        <div class="form-group md:col-span-1">
                            <label>Endereço completo *</label>
                            <input type="text" formControlName="endereco_completo" class="form-input"
                                placeholder="Rua...">
                        </div>
                        <div class="form-group">
                            <label>Valor da carteira *</label>
                            <input type="number" formControlName="valor_carteira" class="form-input" placeholder="R$">
                        </div>
                        <div class="form-group">
                            <label>Valor por transferência *</label>
                            <input type="number" formControlName="valor_transferencia" class="form-input"
                                placeholder="R$">
                        </div>
                    </div>

                    <div
                        class="flex justify-between md:items-center flex-col md:flex-row gap-4 pt-6 border-t border-gray-50">
                        <div class="flex items-center gap-4">
                            <label class="font-semibold text-sm m-0">Status da Escola</label>
                            <select formControlName="status" class="form-input w-40 m-0">
                                <option value="active">Ativo</option>
                                <option value="inactive">Inativo</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary flex items-center gap-2">
                            <lucide-icon [img]="icons.Save" class="w-5 h-5"></lucide-icon>
                            Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>

            <!-- Turmas Tab -->
            <div *ngSwitchCase="'turmas'" class="animate-in slide-in-from-bottom-4 duration-300">
                <app-turma-management [schoolId]="schoolId!"></app-turma-management>
            </div>

            <!-- Professors Tab -->
            <div *ngSwitchCase="'professors'" class="animate-in slide-in-from-bottom-4 duration-300">
                <app-professor-management [schoolId]="schoolId!"></app-professor-management>
            </div>

            <!-- Students Tab -->
            <div *ngSwitchCase="'students'" class="animate-in slide-in-from-bottom-4 duration-300">
                <app-student-management [schoolId]="schoolId!"></app-student-management>
            </div>
        </div>
    </div>

    <app-feedback-modal *ngIf="showSuccessModal" title="Alterações salvas!"
        message="Os dados da escola foram atualizados com sucesso."
        (confirm)="showSuccessModal = false"></app-feedback-modal>
</div>
