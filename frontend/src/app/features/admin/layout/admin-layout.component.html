<div class="flex h-screen bg-gray-50 overflow-hidden">

    <!-- Mobile Backdrop -->
    <div *ngIf="sidebarOpen" (click)="toggleSidebar()"
        class="fixed inset-0 bg-black/50 z-40 md:hidden animate-in fade-in duration-200"></div>

    <!-- Sidebar -->
    <aside [ngClass]="[
            sidebarOpen ? 'translate-x-0 w-[260px]' : '-translate-x-full md:translate-x-0 w-[72px]',
            'fixed md:relative z-50 h-full bg-white border-r border-gray-100 flex flex-col transition-all duration-300 ease-in-out shadow-sm'
        ]">

        <!-- Logo area -->
        <div class="h-16 flex items-center px-4 border-b border-gray-100 shrink-0">
            <div *ngIf="sidebarOpen" class="flex items-center justify-between w-full">
                <app-logo className="w-32" [light]="false"></app-logo>
                <button (click)="toggleSidebar()" class="md:hidden p-1 text-gray-400 hover:text-gray-600">
                    <lucide-icon [img]="icons.X" class="w-5 h-5"></lucide-icon>
                </button>
            </div>
            <div *ngIf="!sidebarOpen" class="flex items-center justify-center w-full">
                <app-logo [onlyMark]="true" className="w-8" [light]="false"></app-logo>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-3 pt-6 space-y-1 overflow-y-auto">
            <a *ngFor="let item of menuItems" 
               [routerLink]="['/admin', item.route]"
               routerLinkActive
               #rla="routerLinkActive"
               [ngClass]="rla.isActive
                ? 'bg-gradient-to-r from-[#005bb5]/10 to-[#1a73e8]/5 text-[#005bb5] border-l-[3px] border-[#005bb5]'
                : 'text-gray-500 hover:bg-gray-50 hover:text-gray-700 border-l-[3px] border-transparent'"
               class="w-full flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm font-semibold transition-all duration-200 group no-underline">
                <lucide-icon [img]="item.icon" class="w-[18px] h-[18px] flex-shrink-0"
                    [ngClass]="rla.isActive ? 'text-[#005bb5]' : 'text-gray-400 group-hover:text-gray-600'"></lucide-icon>
                <span *ngIf="sidebarOpen" class="truncate">{{ item.label }}</span>
            </a>
        </nav>

        <!-- Sidebar footer -->
        <div class="p-4 border-t border-gray-100 flex flex-col justify-between">
            <button (click)="logout()"
                class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-bold text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all duration-200">
                <lucide-icon [img]="icons.LogOut" class="w-5 h-5 flex-shrink-0"></lucide-icon>
                <span *ngIf="sidebarOpen">Sair</span>
            </button>
            <div class="w-full text-center mt-6">
                <span class="text-[10px] font-extrabold text-gray-400">{{ appVersion }}</span>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Header -->
        <header
            class="h-20 bg-white border-b border-gray-100 flex items-center justify-between px-6 md:px-10 flex-shrink-0 transition-all duration-300">
            <div class="flex items-center gap-4">
                <button (click)="toggleSidebar()"
                    class="p-2 -ml-2 rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors md:hidden">
                    <lucide-icon [img]="icons.Menu" class="w-6 h-6"></lucide-icon>
                </button>

                <!-- Branding Context Pill -->
                <div class="flex items-center gap-3 bg-gray-50/50 p-1 pr-4 rounded-full border border-gray-200/60 shadow-sm">
                    <div class="bg-white px-3 py-1 rounded-full border border-gray-200 shadow-sm">
                        <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Admin</span>
                    </div>
                    <span class="text-[13px] font-bold text-gray-500 tracking-tight">Painel administrativo</span>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <!-- School Selector -->
                <div class="relative min-w-[220px]">
                    <select [(ngModel)]="selectedSchool" (ngModelChange)="onSchoolChange($event)"
                        [compareWith]="compareSchools"
                        class="w-full bg-white border border-gray-200/80 rounded-xl px-4 py-2.5 text-[13px] font-bold text-gray-700 outline-none appearance-none focus:ring-2 focus:ring-[#00609b]/10 focus:border-[#00609b] transition-all cursor-pointer shadow-sm pr-10">
                        <option [ngValue]="null">Todas as Escolas</option>
                        <option *ngFor="let school of schools" [ngValue]="school">{{ school.name }}</option>
                    </select>
                    <lucide-icon [img]="icons.ChevronDown"
                        class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"></lucide-icon>
                </div>

                <!-- User Profile (Avatar Left) -->
                <div class="flex items-center gap-3 pl-6 border-l border-gray-100">
                    <div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center shadow-lg overflow-hidden border-2 border-slate-800">
                        <img *ngIf="currentUser?.foto_url || currentUser?.foto_perfil" [src]="currentUser.foto_url || currentUser.foto_perfil" class="w-full h-full object-cover">
                        <app-logo *ngIf="!(currentUser?.foto_url || currentUser?.foto_perfil)" [onlyMark]="true" className="w-5 text-white" [light]="true"></app-logo>
                    </div>
                    <div class="text-left leading-tight">
                        <p class="text-[13px] font-black text-gray-800">{{ currentUser?.nome_completo || currentUser?.nome || 'Admin' }}</p>
                        <p class="text-[11px] font-medium text-gray-400 tracking-tight">{{ currentUser?.email || 'admin@exemplo.com' }}</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page content -->
        <main class="flex-1 overflow-y-auto p-6">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
