<div class="dashboard-container">
    <!-- Header Actions (Minimal) -->
    <div class="dashboard-header">
        <div class="filter-container">
            <button *ngFor="let filter of filters" (click)="setFilter(filter)"
                [class.active]="activeFilter === filter" [class.inactive]="activeFilter !== filter"
                class="filter-btn">
                {{ filter }}
            </button>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div *ngFor="let stat of stats" class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all">
            <div class="flex items-center gap-3">
                <div [class]="'w-10 h-10 rounded-full flex items-center justify-center ' + stat.colorClass">
                    <lucide-icon [img]="stat.icon" class="w-5 h-5" [style.color]="stat.iconColor"></lucide-icon>
                </div>
                <span class="text-sm font-bold text-gray-800">{{ stat.label }}</span>
            </div>
            <div class="mt-6 flex flex-col">
                <span class="text-2xl font-black text-gray-900 leading-none">{{ stat.value }}</span>
                <span class="text-sm font-medium text-gray-400 mt-2">{{ stat.points }}</span>
            </div>
        </div>
    </div>

    <!-- Charts and Table Section -->
    <div class="grid grid-cols-1 lg:grid-cols-[1.2fr_2.2fr] gap-6 mt-8">
        <!-- Pie Chart Card -->
        <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm flex flex-col">
            <h3 class="text-xl font-bold text-gray-900 text-center mb-10">Distribuição de saldo</h3>

            <div *ngIf="hasDonutData" class="flex flex-col items-center">
                <!-- Dynamic Pie Chart -->
                <div class="relative w-64 h-64 flex justify-center items-center">
                    <svg viewBox="0 0 42 42" class="w-full h-full transform -rotate-90">
                        <circle *ngFor="let item of distributionData" cx="21" cy="21" r="10.5" fill="transparent"
                            [attr.stroke]="item.color" stroke-width="21" [attr.stroke-dasharray]="item.dashArray"
                            [attr.stroke-dashoffset]="item.dashOffset" class="transition-all duration-1000">
                        </circle>
                    </svg>
                </div>

                <!-- Legend -->
                <div class="w-full mt-10 p-4 border border-gray-100 rounded-2xl space-y-4">
                    <div *ngFor="let item of distributionData" class="flex items-center justify-between text-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full" [style.backgroundColor]="item.color"></div>
                            <span class="font-medium text-gray-500">{{ item.label }}</span>
                        </div>
                        <span class="font-bold text-gray-900">{{ item.percentage }}%</span>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div *ngIf="!hasDonutData" class="flex-1 flex flex-col items-center justify-center py-20 opacity-40">
                <lucide-icon [img]="icons.PieChart" class="w-16 h-16 text-gray-300"></lucide-icon>
                <p class="text-gray-400 mt-4 font-medium">Sem dados no momento</p>
            </div>
        </div>

        <!-- Table Summary Card -->
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden flex flex-col">
            <div class="p-8 border-b border-gray-50">
                <h3 class="text-xl font-bold text-gray-900">Resumo por turma</h3>
            </div>

            <div class="overflow-x-auto flex-1 custom-scrollbar">
                <table class="w-full text-left min-w-[700px]">
                    <thead>
                        <tr class="text-[11px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-50">
                            <th class="px-8 py-5">Turma</th>
                            <th class="px-8 py-5">
                                <div class="flex items-center gap-1">Qtd. alunos <lucide-icon [img]="icons.ArrowUpDown" class="w-3 h-3"></lucide-icon></div>
                            </th>
                            <th class="px-8 py-5">
                                <div class="flex items-center gap-1">Total investido <lucide-icon [img]="icons.ArrowUpDown" class="w-3 h-3"></lucide-icon></div>
                            </th>
                            <th class="px-8 py-5">
                                <div class="flex items-center gap-1">Total gasto <lucide-icon [img]="icons.ArrowUpDown" class="w-3 h-3"></lucide-icon></div>
                            </th>
                            <th class="px-8 py-5 text-right">
                                <div class="flex items-center justify-end gap-1">Ações <lucide-icon [img]="icons.ArrowUpDown" class="w-3 h-3"></lucide-icon></div>
                            </th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr *ngFor="let turma of turmasSummary" class="hover:bg-gray-50/50 transition-colors">
                            <td class="px-8 py-6 font-bold text-gray-900">{{ turma.name }}</td>
                            <td class="px-8 py-6 text-gray-500 font-medium">{{ turma.students }}</td>
                            <td class="px-8 py-6 text-gray-500 font-bold">{{ turma.invested }}</td>
                            <td class="px-8 py-6 text-gray-500 font-bold">{{ turma.spent }}</td>
                            <td class="px-8 py-6 text-right">
                                <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors text-gray-400 hover:text-gray-600">
                                    <lucide-icon [img]="icons.Eye" class="w-5 h-5"></lucide-icon>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
