<div class="flex h-screen bg-gray-50 overflow-hidden">

    <!-- Mobile Backdrop -->
    <div *ngIf="sidebarOpen" (click)="toggleSidebar()"
        class="fixed inset-0 bg-black/50 z-40 md:hidden animate-in fade-in duration-200"></div>

    <!-- Sidebar -->
    <aside [ngClass]="[
            sidebarOpen ? 'translate-x-0 w-[260px]' : '-translate-x-full md:translate-x-0 w-[72px]',
            'fixed md:relative z-50 h-full bg-white border-r border-gray-100 flex flex-col transition-all duration-300 ease-in-out shadow-sm'
        ]">

        <!-- Logo area -->
        <div class="h-16 flex items-center px-4 border-b border-gray-100">
            <div *ngIf="sidebarOpen" class="flex items-center gap-2">
                <app-logo className="w-36" [light]="false"></app-logo>
            </div>
            <div *ngIf="!sidebarOpen" class="flex items-center justify-center w-full">
                <div
                    class="w-9 h-9 bg-gradient-to-br from-[#005bb5] to-[#1a73e8] rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-sm">CP</span>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-3 pt-6 space-y-1 overflow-y-auto">
            <a *ngFor="let item of menuItems" 
               [routerLink]="['/escola', item.route]"
               routerLinkActive
               #rla="routerLinkActive"
               [ngClass]="rla.isActive
                ? 'bg-gradient-to-r from-[#005bb5]/10 to-[#1a73e8]/5 text-[#005bb5] border-l-[3px] border-[#005bb5]'
                : 'text-gray-500 hover:bg-gray-50 hover:text-gray-700 border-l-[3px] border-transparent'"
               class="w-full flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm font-semibold transition-all duration-200 group no-underline">
                <lucide-icon [img]="item.icon" class="w-[18px] h-[18px] flex-shrink-0"
                    [ngClass]="rla.isActive ? 'text-[#005bb5]' : 'text-gray-400 group-hover:text-gray-600'"></lucide-icon>
                <span *ngIf="sidebarOpen" class="truncate">{{ item.label }}</span>
            </a>
        </nav>

        <!-- Sidebar footer -->
        <div class="p-4 border-t border-gray-100 flex flex-col justify-between">
            <button (click)="logout()"
                class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-bold text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all duration-200">
                <lucide-icon [img]="icons.LogOut" class="w-5 h-5 flex-shrink-0"></lucide-icon>
                <span *ngIf="sidebarOpen">Sair</span>
            </button>
            <div *ngIf="sidebarOpen" class="w-full text-center mt-6">
                <span class="text-[10px] font-extrabold text-[#111827]">{{ appVersion }}</span>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Header -->
        <header
            class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 md:px-8 flex-shrink-0 shadow-sm transition-all duration-300">
            <div class="flex items-center gap-3 md:gap-6">
                <button (click)="toggleSidebar()"
                    class="p-2 -ml-2 rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors md:hidden">
                    <lucide-icon [img]="icons.Menu" class="w-6 h-6"></lucide-icon>
                </button>

                <!-- Branding Context -->
                <div
                    class="hidden sm:flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100">
                    <span class="text-xs font-medium text-gray-500">Painel Escola</span>
                    <div class="w-1 h-1 rounded-full bg-gray-300"></div>
                    <span class="text-xs font-bold text-gray-400">{{ activeRoute | titlecase }}</span>
                </div>
            </div>

            <div class="flex items-center gap-3 md:gap-6">
                <!-- School Selector -->
                <div class="relative min-w-[140px] md:min-w-[200px]">
                    <select [disabled]="true" [(ngModel)]="selectedSchool" (ngModelChange)="onSchoolChange($event)"
                        [compareWith]="compareSchools"
                        class="w-full bg-gray-50 border border-gray-200 rounded-lg px-2 md:px-4 py-2 text-xs md:text-sm font-semibold text-gray-500 outline-none appearance-none transition-all cursor-default shadow-sm pr-2 md:pr-4 opacity-75">
                        <option *ngFor="let school of schools" [ngValue]="school">{{ school.name }}</option>
                    </select>
                </div>

                <!-- User profile details -->
                <div class="flex items-center gap-3 border-l border-gray-100 pl-3 md:pl-6">
                    <div class="text-right hidden sm:block leading-tight">
                        <p class="text-sm font-bold text-gray-800">{{ currentUser?.nome_completo || currentUser?.nome ||
                            'Escola' }}</p>
                        <p class="text-[11px] text-gray-400">{{ currentUser?.email || 'escola@exemplo.com' }}</p>
                    </div>
                    <div
                        class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center border border-gray-200 shadow-sm overflow-hidden group hover:border-[#00609b] transition-all cursor-pointer">
                        <lucide-icon [img]="icons.UserCircle"
                            class="w-6 h-6 text-gray-400 group-hover:text-[#00609b] transition-all"></lucide-icon>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page content -->
        <main class="flex-1 overflow-y-auto p-6">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
